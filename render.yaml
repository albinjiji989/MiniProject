services:
  - type: web
    name: petconnect-ai-ml
    runtime: python
    region: oregon
    plan: free
    branch: main
    rootDir: python-ai-ml
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FLASK_ENV
        value: production
      - key: DEBUG
        value: False
